name: Release

on:
  push:
    tags: ['v*']

env:
  NODE_VERSION: '22'
  DOCKER_PLATFORMS: linux/amd64,linux/arm64

permissions:
  contents: read

jobs:
  # ──── Release Gate (CI-strength) ──────────────────────────────────
  # Mirror the CI workflow's gate jobs so a tag can never publish an image or GitHub Release that
  # lint, the spec type-check, OpenAPI snapshot, unit + e2e tests, the Postgres migration smoke, or the
  # dashboard build/lint/type-check would have rejected. Each job below matches its CI counterpart; only the tag-match
  # guard and the publish jobs (docker, release) are release-specific.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fail fast (before tests, image build, or the GitHub Release) if the release is inconsistent:
      # the tag must match package.json, and the docs/CHANGELOG version guard must pass. This stops a
      # mis-tagged or under-documented release from ever publishing an image or a GitHub Release.
      - name: Verify tag matches package.json version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag '$TAG' (version '$TAG_VERSION') does not match package.json version '$PKG_VERSION'. Bump package.json or fix the tag before releasing."
            exit 1
          fi
          echo "Tag $TAG matches package.json $PKG_VERSION"

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Run ESLint
        run: npm run lint

      # Same gap as CI: `nest build` excludes specs, so a spec-only type regression slips past every
      # existing release gate. tsconfig.json includes both src and test, so this is the full-program
      # check that also covers spec files.
      - name: Type-check full program (including specs)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Check formatting
        run: npm run format:check

      - name: Check version consistency (docs track package.json)
        run: npm run check:versions

      - name: Check OpenAPI snapshot is up to date
        run: npm run openapi:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --coverage

      - name: Run e2e smoke tests
        run: npm run test:e2e

  test-postgres:
    name: Test (PostgreSQL migrations)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openwa
          POSTGRES_PASSWORD: openwa
          POSTGRES_DB: openwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openwa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (compiles the data migrations to dist/)
        run: npm run build

      # Applies the full data-migration chain to a real Postgres and asserts every generated-uuid PK
      # has a DB DEFAULT — the dialect gap SQLite-only tests can't see.
      - name: Migrate + uuid-default smoke against PostgreSQL
        run: npm run test:pg-smoke
        env:
          DATABASE_TYPE: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: '5432'
          DATABASE_USERNAME: openwa
          DATABASE_PASSWORD: openwa
          DATABASE_NAME: openwa

      # Runtime-proves BuiltInFtsProvider on Postgres (websearch_to_tsquery + ts_headline against the
      # STORED body_ts tsvector). The spec self-skips unless DATABASE_TYPE=postgres, so it is a no-op
      # in the default test job and only executes here against the postgres:16 service.
      - name: Postgres FTS provider spec
        run: npx jest src/database/migrations/__tests__/1782400000000-AddMessagesFts.pg.spec.ts
        env:
          DATABASE_TYPE: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: '5432'
          DATABASE_USERNAME: openwa
          DATABASE_PASSWORD: openwa
          DATABASE_NAME: openwa

  dashboard:
    name: Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: cd dashboard && npm ci

      - name: Run ESLint
        run: cd dashboard && npm run lint

      - name: Type-check dashboard tests
        run: cd dashboard && npm run typecheck

      - name: Check i18n parity
        run: cd dashboard && npm run i18n:check

      - name: Build dashboard
        run: cd dashboard && npm run build

      - name: Run dashboard unit tests
        run: cd dashboard && npm run test:unit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, dashboard]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

  # ──── Create GitHub Release ───────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Gate the public Release on every CI-strength job AND a successfully built+pushed image that
    # also boots, so a tag never produces a GitHub Release without passing the same gate CI enforces,
    # a matching container image, and a runtime boot check on both architectures (boot-smoke runs the
    # published image on amd64 + arm64). Trades a few minutes of buildx/boot latency for release
    # safety.
    needs: [lint, test, test-postgres, dashboard, build, docker, boot-smoke, promote, verify-published]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.VERSION }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          # Use EOF delimiter for multi-line output
          {
            echo "NOTES<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Author the release as a real user (the PAT owner) instead of github-actions[bot].
          # Add a repo secret RELEASE_PAT — a fine-grained PAT scoped to this repo with
          # "Contents: read and write". Falls back to GITHUB_TOKEN (bot-authored) when the secret
          # is absent, so the job never breaks before the token is configured.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.NOTES }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  # ──── Docker Image with Version Tag ───────────────────────────────
  docker:
    name: Docker Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: [lint, test, test-postgres, dashboard, build]
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish under a throwaway staging tag ONLY. The release tags (X.Y.Z, X.Y, latest) are
      # applied by the `promote` job, after boot-smoke has actually started the image on both
      # architectures. Publishing them here would make a broken image pullable before the test that
      # catches it has run — which is exactly how a non-starting image reached `latest` in 0.10.3.
      - name: Resolve staging ref
        id: staging
        env:
          REPO: ${{ github.repository }}
        run: echo "ref=ghcr.io/${REPO,,}:smoke-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push (staging tag only)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.staging.outputs.ref }}
          labels: ${{ steps.meta.outputs.labels }}
          # provenance is generated by default (build-push-action v7); pin it explicitly and opt into
          # an SBOM attestation so each release image carries an in-toto SLSA provenance + SBOM pair,
          # verifiable via `docker buildx imagetools inspect`.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──── Boot Smoke (amd64 + arm64) ──────────────────────────────────
  # The docker job proves the image BUILDS for both architectures; this proves the just-pushed image
  # actually BOOTS and serves the liveness endpoint on both. A boot regression that only surfaces at
  # runtime on one architecture (e.g. a native-dep/Chromium SIGTRAP on arm64 that a clean build still
  # produces) cannot reach a public Release. Runs the published image — not a rebuild — against the
  # dependency-free /api/health/live (NOT /ready, which needs a DB and would conflate boot failure
  # with database setup). Both architectures are tried even if the first fails, so logs name both.
  boot-smoke:
    name: Boot smoke (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      packages: read
    needs: [docker]
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve staging image ref
        id: image
        # The image under test carries only the staging tag at this point — the release tags are
        # applied by `promote`, after this job passes. ${REPO,,} lowercases github.repository: GHCR
        # normalizes the repo name to lowercase on push and `docker run` rejects a mixed-case
        # reference, so the pull target must be lowercase too (this repo is rmyndharis/OpenWA).
        env:
          REPO: ${{ github.repository }}
        run: echo "ref=ghcr.io/${REPO,,}:smoke-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Boot + liveness check on each architecture
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          exit_code=0
          for platform in linux/amd64 linux/arm64; do
            echo "::group::boot-smoke $platform"
            docker rm -f openwa-smoke >/dev/null 2>&1 || true
            # Deliberately NOT --rm: a container that exits on its own is auto-removed by --rm, so
            # `docker logs` below finds nothing and the failure reports no cause. The explicit
            # `docker rm -f` at the end of each iteration handles cleanup instead.
            if ! docker run --platform "$platform" -d -p 2785:2785 --name openwa-smoke "$IMAGE" >/dev/null; then
              echo "FAIL: $platform — could not start container (image pull/run error)"
              exit_code=1
              echo "::endgroup::"
              continue
            fi
            ok=""
            for _ in $(seq 1 40); do
              if curl -sf http://127.0.0.1:2785/api/health/live >/dev/null 2>&1; then ok=1; break; fi
              sleep 5
            done
            if [ -n "$ok" ]; then
              echo "OK: $platform — /api/health/live returned 200"
            else
              echo "FAIL: $platform — /api/health/live did not return 200 within ~200s; container logs follow:"
              docker logs openwa-smoke 2>&1 | tail -60 || true
              exit_code=1
            fi
            docker stop openwa-smoke >/dev/null 2>&1 || true
            docker rm -f openwa-smoke >/dev/null 2>&1 || true
            echo "::endgroup::"
          done
          exit "$exit_code"

  # Applies the release tags (X.Y.Z, X.Y, latest) to the image boot-smoke just proved can start.
  # `imagetools create` re-points tags at the existing manifest list without rebuilding, so the
  # promoted image is bit-identical to the one tested, and its provenance and SBOM attestations
  # travel with it. If boot-smoke fails, this job never runs and the release tags never appear.
  promote:
    name: Promote image to release tags
    runs-on: ubuntu-latest
    permissions:
      packages: write
    needs: [boot-smoke]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Tag the smoke-tested image with the release tags
        env:
          REPO: ${{ github.repository }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          staging="ghcr.io/${REPO,,}:smoke-${{ github.run_id }}"
          # metadata-action emits one tag per line. A here-string rather than a pipe, so the loop
          # runs in this shell and `set -e` actually aborts the step on a failed promotion instead
          # of the pipeline swallowing it.
          promoted=0
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            echo "promoting -> $tag"
            docker buildx imagetools create --tag "$tag" "$staging"
            promoted=$((promoted + 1))
          done <<< "$TAGS"
          if [ "$promoted" -eq 0 ]; then
            echo "::error::no release tags were produced by metadata-action — nothing was promoted"
            exit 1
          fi
          echo "promoted $promoted tag(s)"

      - name: Verify the release tag resolves and is multi-arch
        env:
          REPO: ${{ github.repository }}
        run: |
          ref="ghcr.io/${REPO,,}:${GITHUB_REF#refs/tags/v}"
          docker buildx imagetools inspect "$ref" | tee /tmp/inspect.txt
          for want in linux/amd64 linux/arm64; do
            grep -q "$want" /tmp/inspect.txt || { echo "MISSING PLATFORM: $want"; exit 1; }
          done

      # Best-effort tidy-up of the staging tag, and it MUST refuse to act unless that tag is the only
      # one on its version.
      #
      # GHCR deletes by *version*, not by tag, and a version carries every tag pointing at it. The
      # promote step above re-points the release tags at content identical to the staging image, so
      # they resolve to the same digest and therefore the same version — whose tag list is
      # ["smoke-<run>", "X.Y.Z", "X.Y", "latest"]. Deleting that version by id took the release tags
      # with it: v0.10.5 published a GitHub Release while `latest`, `0.10` and `0.10.5` all vanished
      # from the registry, so `docker pull` failed for everyone until they were restored.
      #
      # On the happy path this is now a no-op, which is correct — a stray staging tag is harmless, and
      # far cheaper than un-publishing a release. It still cleans up the case it was written for: a run
      # where promotion never happened, leaving the staging tag alone on its version.
      - name: Remove the staging tag (only when it is alone on its version)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          staging="smoke-${{ github.run_id }}"
          version_json=$(gh api "/users/${{ github.repository_owner }}/packages/container/openwa/versions" \
            --jq ".[] | select(.metadata.container.tags[]? == \"$staging\") | {id, tags: .metadata.container.tags}" | head -1)
          if [ -z "$version_json" ]; then
            echo "staging tag not found (already cleaned up)"
            exit 0
          fi
          version_id=$(printf '%s' "$version_json" | jq -r .id)
          tags=$(printf '%s' "$version_json" | jq -r '.tags | join(",")')
          tag_count=$(printf '%s' "$version_json" | jq -r '.tags | length')
          if [ "$tag_count" = "1" ]; then
            gh api -X DELETE "/users/${{ github.repository_owner }}/packages/container/openwa/versions/$version_id" \
              && echo "removed staging-only version $version_id"
          else
            echo "keeping version $version_id — the release tags share it (tags: $tags)."
            echo "Deleting it would unpublish them; the stray staging tag is left behind on purpose."
          fi

  # ──── Verify what the public can actually pull ────────────────────
  # The last thing to run, and the only check that looks at the registry the way a user does.
  #
  # v0.10.5 shipped with every job green and nothing pullable: the promote step tagged correctly, its
  # own verify step confirmed the tag, and the cleanup step immediately after deleted the version those
  # tags shared — so `latest`, `0.10` and `0.10.5` all vanished. Nothing noticed, because every existing
  # check ran BEFORE the cleanup and from a runner already logged in to GHCR.
  #
  # This job fixes both blind spots. It runs after promote (so it sees the final state, cleanup
  # included) and it never logs in, so it fails on a tag that exists but is not publicly readable —
  # which is indistinguishable from a missing tag to everyone downstream. It checks every tag a user
  # might pull, not just the exact version.
  verify-published:
    name: Verify published tags (anonymous)
    runs-on: ubuntu-latest
    needs: [promote]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Deliberately NO docker/login-action here. Authenticating would defeat the purpose.
      - name: Resolve every release tag without credentials
        env:
          REPO: ${{ github.repository }}
        run: |
          # Fail closed. A verification step that reports success because something upstream of the
          # assertion broke is worse than no verification at all — `set -e` plus the checked-count
          # assertion below mean this job cannot pass without having actually resolved all three tags.
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          minor="${version%.*}"
          expected=3
          checked=0
          failed=0
          for tag in "$version" "$minor" latest; do
            ref="ghcr.io/${REPO,,}:${tag}"
            echo "::group::$ref"
            if ! docker buildx imagetools inspect "$ref" > "/tmp/pub-${tag}.txt" 2>&1; then
              echo "::error::$ref is not publicly pullable after promotion."
              cat "/tmp/pub-${tag}.txt"
              failed=1
              echo "::endgroup::"
              continue
            fi
            for want in linux/amd64 linux/arm64; do
              if ! grep -q "$want" "/tmp/pub-${tag}.txt"; then
                echo "::error::$ref resolves but is missing $want"
                failed=1
              fi
            done
            echo "$ref OK"
            checked=$((checked + 1))
            echo "::endgroup::"
          done
          if [ "$checked" -ne "$expected" ]; then
            echo "::error::only verified $checked of $expected tags — treating that as a failed release."
            failed=1
          fi
          if [ "$failed" -ne 0 ]; then
            echo "::error::The release is not usable. Re-point the missing tags before announcing it."
            exit 1
          fi
          echo "all $checked release tags are publicly pullable and multi-arch"
